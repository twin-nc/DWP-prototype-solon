spring.application.name=dcms

# Server
server.port=${PORT:8081}

# Database
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/dcms}
spring.datasource.username=${DB_USERNAME:dcms}
spring.datasource.password=${DB_PASSWORD:dcms}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# OAuth2 resource server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/dcms}

# Logging (overridden by logback-spring.xml)
logging.level.root=${LOG_LEVEL:info}
logging.level.com.netcompany.dcms=${LOG_LEVEL:info}

# Graceful shutdown (handles SIGTERM)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Actuator — disable default endpoints; we expose custom /health endpoints
management.endpoints.web.exposure.include=
management.endpoint.health.enabled=false
