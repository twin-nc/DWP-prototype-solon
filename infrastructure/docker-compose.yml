version: "3.9"

services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dcms
      POSTGRES_PASSWORD: dcms
      POSTGRES_DB: dcms
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcms"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    ports:
      - "9090:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/realms/dcms || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: postgresql://dcms:dcms@db:5432/dcms
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/dcms
      LOG_LEVEL: info
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8081/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
