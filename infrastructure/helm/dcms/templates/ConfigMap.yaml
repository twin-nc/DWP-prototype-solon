apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcms.fullname" . }}-config
  labels:
    {{- include "dcms.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.env.PORT | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  SPRING_PROFILES_ACTIVE: {{ .Values.env.SPRING_PROFILES_ACTIVE | quote }}
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  KEYCLOAK_ISSUER_URI: {{ .Values.env.KEYCLOAK_ISSUER_URI | quote }}
