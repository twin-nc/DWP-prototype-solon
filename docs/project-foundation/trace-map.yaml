# ---------------------------------------------------------------------------
# FUNCTIONALITY CATALOG
# Keyed by functionality_id. Each entry must have exactly one primary_module.
# ---------------------------------------------------------------------------
functionality_catalog:
  # Source: development-plan.md §7.1–7.7 (I09/I11 import, 2026-04-24)
  # All entries status: "planned" — none yet implemented.
  # Class A = subject to ruling status gates and sign-off requirements.
  # Class B = internal platform capability, lower governance overhead.

  # --- Process / Workflow ---
  FNC-PROC-001:
    name: "Collection process orchestration"
    description: "COLLECTION_PROCESS BPMN: ingest, statute-barred gateway, vulnerability routing, champion/challenger assignment, agent task creation, escalation, and terminal states. Source: development-plan.md §7.4.1."
    primary_module: "MOD-BE-PROCESS"
    supporting_modules: ["MOD-BE-STRATEGY", "MOD-BE-WORKALLOCATION", "MOD-FE-APP", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-PROC-002:
    name: "Write-off approval workflow"
    description: "WRITE_OFF_APPROVAL_PROCESS: 4-tier approval chain (AGENT → TEAM_LEADER → OPS_MANAGER → SRO), write_off_limit_check.dmn threshold routing, CreateTaskListener self-approval prevention. Source: development-plan.md §7.4.2."
    primary_module: "MOD-BE-PROCESS"
    supporting_modules: ["MOD-BE-ACCOUNT", "MOD-BE-WORKALLOCATION", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-PROC-003:
    name: "Treatment path history and override management"
    description: "Per-account treatment path history view, manual override with reason code capture, override audit trail. Source: development-plan.md §7.4.1, §7.5."
    primary_module: "MOD-BE-STRATEGY"
    supporting_modules: ["MOD-BE-PROCESS", "MOD-FE-APP", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-PROC-004:
    name: "Breathing space process"
    description: "BREATHING_SPACE_PROCESS: dual path (STANDARD 60-day moratorium, MENTAL_HEALTH_CRISIS open-ended), enforcement suspension, arrangement monitoring suspension, auto-resume on expiry. Source: development-plan.md §7.4.3."
    primary_module: "MOD-BE-PROCESS"
    supporting_modules: ["MOD-BE-ACCOUNT", "MOD-BE-REPAYMENTPLAN", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-PROC-005:
    name: "Contact suppression enforcement"
    description: "Configurable suppression rules evaluated at outbound contact steps; suppression_rules.dmn drives automated channel block; override requires explicit reason code. Source: development-plan.md §7.5.5."
    primary_module: "MOD-BE-COMMS"
    supporting_modules: ["MOD-BE-PROCESS", "MOD-BE-STRATEGY", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-PROC-006:
    name: "Champion/challenger treatment assignment"
    description: "segment_profile.dmn → champion_challenger_assignment.dmn pipeline. Assignment must be deterministic hash-based per ADR-010. NOTE: dev-plan DMN uses random variable — flagged OI-I09-03; ADR-010 takes precedence and DMN must be refactored before implementation. Source: development-plan.md §7.5.6–7.5.7."
    primary_module: "MOD-BE-STRATEGY"
    supporting_modules: ["MOD-BE-PROCESS", "MOD-BE-ANALYTICS"]
    status: "planned"
    class: "A"
  FNC-PROC-007:
    name: "Arrangement monitoring and breach detection"
    description: "ARRANGEMENT_MONITORING_PROCESS: scheduled payment checks, configurable tolerance window (grace_period_days, tolerance_percentage), skipBreachOnResume logic, breach escalation task. Source: development-plan.md §7.4.4."
    primary_module: "MOD-BE-REPAYMENTPLAN"
    supporting_modules: ["MOD-BE-PROCESS", "MOD-BE-PAYMENT", "MOD-BE-WORKALLOCATION", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-PROC-008:
    name: "Statute-barred debt identification"
    description: "statute_barred_check.dmn: debt age assessment, clock-reset event evaluation, clearance window gateway in COLLECTION_PROCESS. DO NOT PROCEED: awaiting RULING-009 sign-off and DDE-OQ-11 resolution. Source: development-plan.md §7.5.1."
    primary_module: "MOD-BE-STRATEGY"
    supporting_modules: ["MOD-BE-PROCESS", "MOD-BE-ACCOUNT"]
    status: "planned"
    class: "A"

  # --- Repayment / Assessment ---
  FNC-RPF-001:
    name: "Income and expenditure capture"
    description: "Structured I&E data capture on customer record; feeds affordability_assessment.dmn to produce recommended arrangement terms. Source: development-plan.md §7.5.4, §7.4.4."
    primary_module: "MOD-BE-REPAYMENTPLAN"
    supporting_modules: ["MOD-BE-CUSTOMER", "MOD-FE-APP", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-RPF-002:
    name: "Repayment arrangement creation and management"
    description: "Arrangement lifecycle: create, modify, renegotiate post-breach, extendArrangementEndDate (REQUIRES_NEW propagation — OI-I09-04 requires dedicated integration test). Source: development-plan.md §7.4.4."
    primary_module: "MOD-BE-REPAYMENTPLAN"
    supporting_modules: ["MOD-BE-PAYMENT", "MOD-BE-PROCESS", "MOD-FE-APP", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"

  # --- Auth / Access ---
  FNC-AUTH-001:
    name: "User account and identity management"
    description: "Keycloak-backed user lifecycle (create, modify, deactivate), JWT claim propagation to Spring Security, SSO via OIDC. Source: CLAUDE.md auth section, development-plan.md §7.1."
    primary_module: "MOD-BE-USER"
    supporting_modules: ["MOD-PLAT-INFRA", "MOD-BE-AUDIT"]
    status: "planned"
    class: "B"
  FNC-AUTH-002:
    name: "Team-based and role-based access control"
    description: "RBAC via JWT roles (AGENT, TEAM_LEADER, OPS_MANAGER, COMPLIANCE, ADMIN — placeholder; full matrix pending I01/I02 governance terms). Team-based restriction enforcement. Source: CLAUDE.md, development-plan.md §7.1."
    primary_module: "MOD-BE-USER"
    supporting_modules: ["MOD-BE-WORKALLOCATION", "MOD-FE-APP"]
    status: "planned"
    class: "A"
  FNC-AUTH-003:
    name: "Vulnerability flag capture and workflow routing"
    description: "Vulnerability status recorded on customer entity; vulnerability_routing.dmn triggers differentiated treatment path in COLLECTION_PROCESS. Source: development-plan.md §7.5.3."
    primary_module: "MOD-BE-CUSTOMER"
    supporting_modules: ["MOD-BE-PROCESS", "MOD-BE-STRATEGY", "MOD-FE-APP"]
    status: "planned"
    class: "A"
  FNC-AUTH-004:
    name: "Write-off authority threshold enforcement"
    description: "write_off_limit_check.dmn routes write-off approval to appropriate tier by amount and role. All thresholds provisional pending DDE-OQ-02 (OI-I09-02). Source: development-plan.md §7.5.8."
    primary_module: "MOD-BE-PROCESS"
    supporting_modules: ["MOD-BE-ACCOUNT", "MOD-BE-WORKALLOCATION"]
    status: "planned"
    class: "A"

  # --- Customer / Account ---
  FNC-CUST-001:
    name: "Customer profile and contact management"
    description: "Customer entity: identity, contact details, channel preferences, third-party authority; multi-level relationship to accounts and households."
    primary_module: "MOD-BE-CUSTOMER"
    supporting_modules: ["MOD-FE-APP", "MOD-BE-AUDIT"]
    status: "planned"
    class: "B"
  FNC-CUST-002:
    name: "Account balance, ledger, and payment history"
    description: "Financial ledger per debt account: running balance, payment history, regulatory event recording (breathing space date, insolvency date, fraud marker). Per ADR-001/002, ledger records facts; lifecycle effect owned by process engine."
    primary_module: "MOD-BE-ACCOUNT"
    supporting_modules: ["MOD-BE-PAYMENT", "MOD-FE-APP", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-CUST-003:
    name: "Relationship and household management"
    description: "Joint debt split, household linking, relationship history with effective dates, third-party authority recording."
    primary_module: "MOD-BE-CUSTOMER"
    supporting_modules: ["MOD-BE-ACCOUNT", "MOD-FE-APP", "MOD-BE-AUDIT"]
    status: "planned"
    class: "B"
  FNC-CUST-004:
    name: "Affordability assessment"
    description: "affordability_assessment.dmn: I&E data input → recommended arrangement terms output. Used by arrangement creation flow and treatment routing. Source: development-plan.md §7.5.4."
    primary_module: "MOD-BE-STRATEGY"
    supporting_modules: ["MOD-BE-REPAYMENTPLAN", "MOD-BE-CUSTOMER"]
    status: "planned"
    class: "A"

  # --- Audit ---
  FNC-AUD-001:
    name: "Immutable event audit log"
    description: "Every state change, access event, and override recorded with actor, timestamp, and reason code; append-only log."
    primary_module: "MOD-BE-AUDIT"
    supporting_modules: ["MOD-BE-PROCESS", "MOD-FE-APP"]
    status: "planned"
    class: "A"
  FNC-AUD-002:
    name: "Compliance and override audit reporting"
    description: "Reporting on treatment overrides, write-off approvals, and access events for compliance review; feeds compliance team worklist."
    primary_module: "MOD-BE-AUDIT"
    supporting_modules: ["MOD-BE-REPORTING", "MOD-FE-APP"]
    status: "planned"
    class: "B"

  # --- Integration ---
  FNC-INTG-001:
    name: "DCA placement and integration"
    description: "Anti-corruption layer for DCA placement: case export, status synchronisation, recall on resolution. Third-party management boundary. Source: CLAUDE.md integration module."
    primary_module: "MOD-BE-INTEGRATION"
    supporting_modules: ["MOD-BE-THIRDPARTYMGMT", "MOD-BE-AUDIT"]
    status: "planned"
    class: "A"
  FNC-INTG-002:
    name: "DWP Place integration and debt ingest"
    description: "Anti-corruption layer for DWP Place: debt identification event ingest, unique external reference capture, case creation trigger. Source: CLAUDE.md integration module."
    primary_module: "MOD-BE-INTEGRATION"
    supporting_modules: ["MOD-BE-CUSTOMER", "MOD-BE-ACCOUNT", "MOD-BE-PROCESS"]
    status: "planned"
    class: "A"

