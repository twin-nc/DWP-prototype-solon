version: 2
updated_at: "2026-04-24"

# ---------------------------------------------------------------------------
# OPEN ITEM: I11-OI-01 — development-plan.md §14 requirement ID mismatch
# development-plan.md §14 contains a "Requirements Traceability" table mapping
# requirement IDs to "Satisfied By" implementations. That table's IDs do NOT
# correspond to the tender requirement descriptions in this file. Examples
# observed (2026-04-24): dev-plan RPF.20 = "Breathing space" but trace-map
# RPF.20 = "arrangement history"; dev-plan CC.1 = "Household joint debt" but
# trace-map CC.1 = "outbound letter generation". Root cause unknown — possibly
# a different requirement numbering version was used during dev-plan authoring.
# DO NOT use dev-plan §14 as a source for requirement↔functionality links in
# this file. All FNC links added here (I11, 2026-04-24) are derived from
# subject-matter matching against trace-map descriptions, not from dev-plan §14.
# Owner: tct@netcompany.com  Due: resolve at next baseline review.
# ---------------------------------------------------------------------------

baseline_sources:
  functional_requirements: "Tender requirements docs/Functional-Requirements-Consolidated.md"
  non_functional_requirements: "Tender requirements docs/Non-Functional-Requirements-Consolidated.md"

status_values:
  requirement: ["complete", "partial", "gap", "awaiting-ruling", "deviation"]
  functionality: ["planned", "in-progress", "complete", "deferred"]
  link_confidence: ["confirmed", "proposed"]

